name: Validate portfolio

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate static site
        run: python scripts/validate_site.py
      - name: Check JavaScript syntax
        run: node --check assets/js/main.js
